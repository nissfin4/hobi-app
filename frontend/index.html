    <p id="owner"></p>
    <p id="nim"></p>

    <ul id="item-list"></ul>

    <hr>
    <h3>Tambah Item Baru:</h3>
    <input type="text" id="item-input" placeholder="Nama album...">
    <button onclick="tambahItem()">Tambah</button>

    <script>
        const API_URL = '/api';

        // function loadData() {

        //             });
        //         });

        function loadData() {
    fetch(`${API_URL}/info`)
        .then(res => {
            if (!res.ok) {
                throw new Error("Response error: " + res.status);
            }
            return res.json();
        })
        .then(data => {
            console.log("DATA:", data);

            document.getElementById('title').innerText = data.judul_katalog || "Tidak ada";
            document.getElementById('owner').innerText = data.pemilik || "-";
            document.getElementById('nim').innerText = data.nim || "-";

            const list = document.getElementById('item-list');
            list.innerHTML = '';

            // 🔥 FIX DI SINI
            if (data.items && Array.isArray(data.items)) {
                data.items.forEach(item => {
                    let li = document.createElement('li');
                    li.innerText = item;
                    list.appendChild(li);
                });
            } else {
                console.error("items tidak ada:", data);
            }
        })
        .catch(err => {
            console.error("FETCH ERROR:", err);
        });
}

        function tambahItem() {
            const input = document.getElementById('item-input');

            fetch(`${API_URL}/add-item`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ item: input.value })
            })
            .then(res => res.json())
            .then(() => {
                input.value = '';
                loadData();
            });
        }

        loadData();
    </script>
</body>
